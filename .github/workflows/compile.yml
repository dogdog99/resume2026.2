name: Build and Commit Resume

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 必須拉取完整的 git 歷史紀錄才能推回 main
          fetch-depth: 0

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex

      - name: Convert PDF to PNG
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml
          # 加入 -flatten 確保白底，並轉為 PNG
          convert -density 300 -flatten resume.pdf[0] -quality 90 resume.png

      - name: Commit and Push to Main
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add resume.pdf resume.png
          # 檢查是否有變更，避免無意義的提交
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update resume PDF and PNG [skip ci]"
            git push origin main
          fi